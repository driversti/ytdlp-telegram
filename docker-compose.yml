services:
  bot:
    image: registry.yurii.live/ytdlp-telegram:v0.1.9
    container_name: ytdlp-telegram-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./downloads:/downloads
    network_mode: host  # For Ollama and PO Token server on localhost
    depends_on:
      - pot-server
      - file-server

  file-server:
    image: registry.yurii.live/ytdlp-file-server:v0.1.4
    container_name: ytdlp-file-server
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./downloads:/downloads
    ports:
      - "8080:8080"

  pot-server:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: ytdlp-pot-server
    restart: unless-stopped
    init: true
    ports:
      - "4416:4416"
